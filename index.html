<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; background-color: #000; }
        
        /* 메인 게임 스크린: 주방 배경 */
        #game-screen { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?q=80&w=1200'); 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end;
        }

        /* 루이지 캐릭터: 구글 드라이브 이미지 연동 */
        #luigi-character { 
            position: absolute; 
            bottom: 20%; 
            height: 80%; 
            z-index: 1; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* 미연시 전형적인 하단 대사창 */
        #dialogue-box { 
            position: absolute; 
            bottom: 20px; 
            width: 94%; 
            height: 30%; 
            background: rgba(20, 20, 20, 0.9); 
            border: 4px solid #009246; /* 이탈리아 초록색 */
            border-radius: 15px; 
            padding: 20px; 
            box-sizing: border-box; 
            color: white; 
            z-index: 2; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 -5px 30px rgba(0,0,0,0.8);
        }

        #name-tag { 
            background: #CD212A; /* 이탈리아 빨간색 */
            color: white; 
            padding: 5px 20px; 
            font-family: 'Nanum Myeongjo', serif;
            font-size: 22px; 
            font-weight: bold; 
            width: fit-content; 
            border-radius: 5px; 
            margin-bottom: 10px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        #text-area { 
            font-size: 18px; 
            line-height: 1.6; 
            color: #efefef; 
            flex-grow: 1; 
            overflow-y: auto; 
            margin-bottom: 10px;
        }

        /* 입력 인터페이스 */
        #input-wrap { display: flex; gap: 12px; }
        #user-input { 
            flex-grow: 1; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #111; 
            color: white; 
            font-size: 16px; 
        }
        #user-input:focus { outline: 2px solid #009246; background: #1a1a1a; }
        
        #send-btn { 
            padding: 0 30px; 
            background: #009246; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: 0.2s;
        }
        #send-btn:hover { background: #007a3a; transform: translateY(-2px); }
        #send-btn:disabled { background: #333; color: #777; cursor: not-allowed; transform: none; }

        /* 타이핑 애니메이션 효과 */
        .typing { border-right: 2px solid #fff; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }
    </style>
</head>
<body>

<div id="game-screen">
    <img id="luigi-character" src="https://lh3.googleusercontent.com/d/1bMfSpJnnXgWNvKIY5Y-QYtkuLUBiy2RP" alt="Chef Luigi">

    <div id="dialogue-box">
        <div id="name-tag">Chef Luigi</div>
        <div id="text-area">
            *Parses his mustache and stares at you with arms crossed* Mamma mia! Welcome to my sacred kitchen. If you want to cook here, prove your respect! Tell me, why do we care so much about food rules? Answer me using 'legacy' or 'Campanilismo' with [If, When, or While]!
        </div>
        <div id="input-wrap">
            <input type="text" id="user-input" placeholder="이곳에 영어 문장을 입력하고 엔터를 누르세요..." autocomplete="off">
            <button id="send-btn">TALK</button>
        </div>
    </div>
</div>

<script>
    /**
     * [환경 세팅]
     * 발급받으신 gsk_ 키를 여기에 입력하세요.
     */
    const GROQ_API_KEY = "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"; 

    // 이미지 주소 (구글 드라이브 다이렉트 링크 공식 포맷)
    const imgAngry = "https://lh3.googleusercontent.com/d/1bMfSpJnnXgWNvKIY5Y-QYtkuLUBiy2RP";
    const imgHappy = "https://lh3.googleusercontent.com/d/1okUXDt8f51xPNH8Vji5EVfx_Jh54UErf";

    const textArea = document.getElementById('text-area');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const luigiImg = document.getElementById('luigi-character');

    let isStage2 = false; // 현재 단계 추적 (Stage 1: 문법검사, Stage 2: AI토론)
    let memory = [
        { role: "system", content: "You are Chef Luigi, a traditional Italian chef. You act like a visual novel NPC. Every response MUST start with a dramatic action description in asterisks (e.g., *Nods dramatically and smiles*), followed by your English dialogue. You are debating the 'Sweet Potato Pizza' dilemma. Keep answers concise (2 sentences)." }
    ];

    // 엔터키 입력 처리
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleTalk(); });
    sendBtn.addEventListener('click', handleTalk);

    async function handleTalk() {
        const msg = userInput.value.trim();
        if (!msg || sendBtn.disabled) return;

        // Stage 1: 수동 검증 (조건부 부사절 + 핵심 어휘)
        if (!isStage2) {
            const hasGrammar = /\b(if|when|while)\b/i.test(msg);
            const hasVocab = /\b(legacy|campanilismo)\b/i.test(msg);

            if (hasGrammar && hasVocab) {
                // 성공: Stage 2로 진입
                isStage2 = true;
                updateLuigi(imgHappy, "*Claps with joy* <b>Magnifico!</b> You passed. But look at this Korean 'Sweet Potato Pizza'. Is this innovation or a crime? Convince me!");
                userInput.value = "";
                userInput.placeholder = "루이지와 자유롭게 대화하세요...";
                return;
            } else {
                // 실패: 튕겨내기
                updateLuigi(imgAngry, "*Waves spoon angrily* No, no! Check your grammar [if, when, while] and vocabulary [legacy, campanilismo] again!");
                userInput.value = "";
                return;
            }
        }

        // Stage 2: Groq AI 실시간 연동
        lockInput(true);
        textArea.innerHTML = "<i>Luigi is thinking...</i>";
        memory.push({ role: "user", content: msg });

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                body: JSON.stringify({ model: "llama3-8b-8192", messages: memory, temperature: 0.7 })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;

            memory.push({ role: "assistant", content: reply });
            updateLuigi(imgHappy, reply);

        } catch (err) {
            textArea.innerHTML = "*(Luigi is distracted by kitchen smoke. Check your API key or internet!)*";
            console.error(err);
        } finally {
            lockInput(false);
            userInput.value = "";
            userInput.focus();
        }
    }

    function updateLuigi(imgSrc, text) {
        luigiImg.src = imgSrc;
        textArea.innerHTML = text;
        // 캐릭터 움직임 효과
        luigiImg.style.transform = "translateY(-10px) scale(1.02)";
        setTimeout(() => { luigiImg.style.transform = "translateY(0) scale(1)"; }, 200);
    }

    function lockInput(lock) {
        userInput.disabled = lock;
        sendBtn.disabled = lock;
    }
</script>

</body>
</html>
